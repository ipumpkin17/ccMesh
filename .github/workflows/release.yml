name: Release

# 推送扩展版本 tag 后构建三平台安装包。矩阵任务不直接操作 GitHub Release，
# 只有所有构建成功后才由 publish-release 统一创建草稿并上传资产。
on:
  push:
    tags:
      - 'v*.*.*-*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: '重新构建并发布的 tag，例如 v0.2.1-8；留空则只做手动构建验证'
        required: false
        type: string

permissions:
  contents: write

env:
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

concurrency:
  group: '${{ github.workflow }}-${{ github.ref }}'
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
            rust_targets: 'aarch64-apple-darwin,x86_64-apple-darwin'
            artifact_name: macos
            artifact_paths: |
              src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz
              src-tauri/target/universal-apple-darwin/release/bundle/macos/*.app.tar.gz.sig
          - platform: ubuntu-22.04
            args: ''
            rust_targets: ''
            artifact_name: linux
            artifact_paths: |
              src-tauri/target/release/bundle/appimage/*.AppImage
              src-tauri/target/release/bundle/appimage/*.AppImage.sig
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/deb/*.deb.sig
              src-tauri/target/release/bundle/rpm/*.rpm
              src-tauri/target/release/bundle/rpm/*.rpm.sig
          - platform: windows-latest
            args: ''
            rust_targets: ''
            artifact_name: windows
            artifact_paths: |
              src-tauri/target/release/bundle/msi/*.msi
              src-tauri/target/release/bundle/msi/*.msi.sig
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/bundle/nsis/*.exe.sig

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: '1.96.0'
          targets: ${{ matrix.rust_targets }}

      # 仅用于缩短构建时间；即使未命中缓存，Release 也能独立完成。
      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'
          prefix-key: 'v1-rust'
          key: 'release-${{ matrix.platform }}'
          cache-all-crates: true
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build ${{ matrix.args }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
          retention-days: 1

  publish-release:
    name: Publish GitHub Release draft
    needs: build
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-assets-*
          path: release-assets
          merge-multiple: true

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          required_files=(
            '*.dmg'
            '*.app.tar.gz'
            '*.app.tar.gz.sig'
            '*.AppImage'
            '*.AppImage.sig'
            '*.deb'
            '*.deb.sig'
            '*.rpm'
            '*.rpm.sig'
            '*.msi'
            '*.msi.sig'
            '*.exe'
            '*.exe.sig'
          )
          for pattern in "${required_files[@]}"; do
            if ! find release-assets -type f -name "$pattern" -print -quit | grep -q .; then
              echo "缺少发布资产：$pattern" >&2
              exit 1
            fi
          done
          find release-assets -type f -printf '%P\n' | sort

      - name: Generate release notes
        run: |
          git remote add upstream https://github.com/VkRainB/ccMesh.git
          git fetch --tags upstream
          current_tag="${RELEASE_TAG}"
          previous_tag="$(git tag --merged "$current_tag" --sort=-version:refname | awk -v current="$current_tag" '$0 != current && $0 ~ /^v[0-9]/ { print; exit }')"
          args=(--to "$current_tag" --output release-notes.md)
          if [ -n "$previous_tag" ]; then
            args+=(--from "$previous_tag")
          fi
          npx --yes changelogithub@14.0.0 "${args[@]}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

      - name: Generate updater manifest
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          base_url="https://github.com/${REPOSITORY}/releases/download/${TAG}"
          macos_bundle="$(find release-assets -type f -name '*.app.tar.gz' -print -quit)"
          linux_bundle="$(find release-assets -type f -name '*.AppImage' -print -quit)"
          deb_bundle="$(find release-assets -type f -name '*.deb' -print -quit)"
          rpm_bundle="$(find release-assets -type f -name '*.rpm' -print -quit)"
          windows_bundle="$(find release-assets -type f -name '*.msi' -print -quit)"
          nsis_bundle="$(find release-assets -type f -name '*.exe' -print -quit)"
          macos_signature="$(cat "${macos_bundle}.sig")"
          linux_signature="$(cat "${linux_bundle}.sig")"
          deb_signature="$(cat "${deb_bundle}.sig")"
          rpm_signature="$(cat "${rpm_bundle}.sig")"
          windows_signature="$(cat "${windows_bundle}.sig")"
          nsis_signature="$(cat "${nsis_bundle}.sig")"
          jq -n \
            --arg version "$version" \
            --arg pub_date "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg macos_url "${base_url}/$(basename "$macos_bundle")" \
            --arg macos_signature "$macos_signature" \
            --arg linux_url "${base_url}/$(basename "$linux_bundle")" \
            --arg linux_signature "$linux_signature" \
            --arg deb_url "${base_url}/$(basename "$deb_bundle")" \
            --arg deb_signature "$deb_signature" \
            --arg rpm_url "${base_url}/$(basename "$rpm_bundle")" \
            --arg rpm_signature "$rpm_signature" \
            --arg windows_url "${base_url}/$(basename "$windows_bundle")" \
            --arg windows_signature "$windows_signature" \
            --arg nsis_url "${base_url}/$(basename "$nsis_bundle")" \
            --arg nsis_signature "$nsis_signature" \
            '{version: $version, notes: "", pub_date: $pub_date, platforms: {
              "darwin-aarch64": {url: $macos_url, signature: $macos_signature},
              "darwin-x86_64": {url: $macos_url, signature: $macos_signature},
              "darwin-aarch64-app": {url: $macos_url, signature: $macos_signature},
              "darwin-x86_64-app": {url: $macos_url, signature: $macos_signature},
              "linux-x86_64": {url: $linux_url, signature: $linux_signature},
              "linux-x86_64-appimage": {url: $linux_url, signature: $linux_signature},
              "linux-x86_64-deb": {url: $deb_url, signature: $deb_signature},
              "linux-x86_64-rpm": {url: $rpm_url, signature: $rpm_signature},
              "windows-x86_64": {url: $windows_url, signature: $windows_signature},
              "windows-x86_64-msi": {url: $windows_url, signature: $windows_signature},
              "windows-x86_64-nsis": {url: $nsis_url, signature: $nsis_signature}
            }}' > release-assets/latest.json

      - name: Create draft release and upload assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          name: ccMesh ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          body_path: release-notes.md
          draft: true
          prerelease: false
          files: release-assets/**/*
