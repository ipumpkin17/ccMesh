<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tauri 开发文档</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            /* Cyan 色系 - 技术文档风格 */
            --color-primary: #0891B2;
            --color-primary-light: #22D3EE;
            --color-primary-dark: #0E7490;
            --color-primary-50: #ECFEFF;
            --color-primary-100: #CFFAFE;
            --color-primary-200: #A5F3FC;

            --color-success: #22C55E;
            --color-success-light: #DCFCE7;

            --color-text: #164E63;
            --color-text-secondary: #0F766E;
            --color-text-muted: #64748B;
            --color-text-light: #94A3B8;

            --color-bg: #FAFCFD;
            --color-bg-white: #FFFFFF;
            --color-bg-subtle: #F8FAFC;
            --color-bg-hover: #F0F9FF;

            --color-border: #E2E8F0;
            --color-border-light: #F1F5F9;

            --shadow-xs: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.06), 0 2px 4px -2px rgba(0,0,0,0.04);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.06), 0 4px 6px -4px rgba(0,0,0,0.04);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.06), 0 8px 10px -6px rgba(0,0,0,0.04);

            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
            --radius-xl: 20px;
        }

        body {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.7;
            -webkit-font-smoothing: antialiased;
        }

        /* ===== Header ===== */
        .header {
            background: var(--color-bg-white);
            border-bottom: 1px solid var(--color-border);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
            background: rgba(255, 255, 255, 0.92);
        }

        .header-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--color-primary), var(--color-primary-light));
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .header-logo svg {
            width: 22px;
            height: 22px;
            color: white;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--color-text);
            letter-spacing: -0.02em;
        }

        .header-badge {
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--color-primary);
            background: var(--color-primary-50);
            padding: 2px 8px;
            border-radius: 20px;
            border: 1px solid var(--color-primary-200);
        }

        .header-search {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .search-box {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--color-bg-subtle);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-sm);
            color: var(--color-text-muted);
            font-size: 0.85rem;
            width: 240px;
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .search-box:hover {
            border-color: var(--color-primary-200);
            background: var(--color-bg-white);
        }

        .search-box svg {
            width: 16px;
            height: 16px;
            opacity: 0.5;
        }

        .search-shortcut {
            font-size: 0.7rem;
            background: var(--color-bg-white);
            border: 1px solid var(--color-border);
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: auto;
            font-family: 'JetBrains Mono', monospace;
        }

        /* ===== Layout ===== */
        .layout {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            min-height: calc(100vh - 64px);
        }

        /* ===== Sidebar ===== */
        .sidebar {
            width: 280px;
            flex-shrink: 0;
            border-right: 1px solid var(--color-border);
            background: var(--color-bg-white);
            padding: 20px 0;
            position: sticky;
            top: 64px;
            height: calc(100vh - 64px);
            overflow-y: auto;
        }

        .sidebar-section {
            margin-bottom: 24px;
        }

        .sidebar-section-title {
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--color-text-muted);
            padding: 0 20px;
            margin-bottom: 8px;
        }

        .doc-list {
            list-style: none;
        }

        .doc-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 20px;
            color: var(--color-text-secondary);
            text-decoration: none;
            font-size: 0.88rem;
            font-weight: 450;
            transition: all 0.15s ease;
            cursor: pointer;
            border-left: 2px solid transparent;
        }

        .doc-link:hover {
            background: var(--color-bg-hover);
            color: var(--color-primary);
        }

        .doc-link.active {
            background: var(--color-primary-50);
            color: var(--color-primary);
            border-left-color: var(--color-primary);
            font-weight: 500;
        }

        .doc-link-icon {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
            opacity: 0.6;
        }

        .doc-link.active .doc-link-icon {
            opacity: 1;
        }

        .doc-link-text {
            flex: 1;
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ===== Content ===== */
        .content {
            flex: 1;
            min-width: 0;
            padding: 32px 48px;
            max-width: 900px;
        }

        /* Welcome Screen */
        .welcome {
            max-width: 640px;
            margin: 0 auto;
            padding-top: 40px;
        }

        .welcome-header {
            margin-bottom: 40px;
        }

        .welcome-title {
            font-size: 2rem;
            font-weight: 700;
            color: var(--color-text);
            letter-spacing: -0.03em;
            margin-bottom: 12px;
            line-height: 1.2;
        }

        .welcome-desc {
            font-size: 1.05rem;
            color: var(--color-text-muted);
            line-height: 1.6;
        }

        .doc-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .doc-card {
            background: var(--color-bg-white);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-md);
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: flex-start;
            gap: 14px;
        }

        .doc-card:hover {
            border-color: var(--color-primary-200);
            box-shadow: var(--shadow-md);
            transform: translateY(-1px);
        }

        .doc-card-icon {
            width: 40px;
            height: 40px;
            background: var(--color-primary-50);
            border-radius: var(--radius-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .doc-card-icon svg {
            width: 20px;
            height: 20px;
            color: var(--color-primary);
        }

        .doc-card-content {
            flex: 1;
            min-width: 0;
        }

        .doc-card-title {
            font-weight: 600;
            font-size: 0.92rem;
            color: var(--color-text);
            margin-bottom: 4px;
            letter-spacing: -0.01em;
        }

        .doc-card-desc {
            font-size: 0.8rem;
            color: var(--color-text-muted);
            line-height: 1.4;
        }

        /* Document Content */
        .doc-view {
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .doc-header {
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--color-border);
        }

        .doc-breadcrumb {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.82rem;
            color: var(--color-text-muted);
            margin-bottom: 12px;
        }

        .doc-breadcrumb a {
            color: var(--color-primary);
            text-decoration: none;
            cursor: pointer;
        }

        .doc-breadcrumb a:hover {
            text-decoration: underline;
        }

        .doc-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--color-text);
            letter-spacing: -0.03em;
            line-height: 1.2;
        }

        .doc-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-top: 12px;
            font-size: 0.82rem;
            color: var(--color-text-muted);
        }

        .doc-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .doc-meta-item svg {
            width: 14px;
            height: 14px;
        }

        /* Markdown Styles */
        .markdown-body {
            color: var(--color-text);
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .markdown-body h1 {
            font-size: 1.75rem;
            font-weight: 700;
            margin: 48px 0 20px 0;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--color-border);
            color: var(--color-text);
            letter-spacing: -0.02em;
        }

        .markdown-body h1:first-child {
            margin-top: 0;
        }

        .markdown-body h2 {
            font-size: 1.35rem;
            font-weight: 650;
            margin: 40px 0 16px 0;
            color: var(--color-text);
            letter-spacing: -0.02em;
        }

        .markdown-body h3 {
            font-size: 1.12rem;
            font-weight: 600;
            margin: 32px 0 12px 0;
            color: var(--color-text);
        }

        .markdown-body h4 {
            font-size: 1rem;
            font-weight: 600;
            margin: 24px 0 10px 0;
            color: var(--color-text-secondary);
        }

        .markdown-body p {
            margin: 0 0 16px 0;
            color: var(--color-text-secondary);
        }

        .markdown-body a {
            color: var(--color-primary);
            text-decoration: none;
            font-weight: 500;
        }

        .markdown-body a:hover {
            text-decoration: underline;
        }

        .markdown-body strong {
            font-weight: 600;
            color: var(--color-text);
        }

        .markdown-body code {
            background: var(--color-primary-50);
            color: var(--color-primary-dark);
            padding: 2px 7px;
            border-radius: 4px;
            font-size: 0.88em;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 500;
        }

        .markdown-body pre {
            background: #1E293B;
            color: #E2E8F0;
            padding: 20px 24px;
            border-radius: var(--radius-md);
            overflow-x: auto;
            margin: 16px 0;
            border: 1px solid #334155;
        }

        .markdown-body pre code {
            background: transparent;
            padding: 0;
            color: inherit;
            font-size: 0.86rem;
            font-weight: 400;
            line-height: 1.7;
        }

        .markdown-body ul, .markdown-body ol {
            margin: 0 0 16px 0;
            padding-left: 24px;
            color: var(--color-text-secondary);
        }

        .markdown-body li {
            margin-bottom: 6px;
        }

        .markdown-body li::marker {
            color: var(--color-primary);
        }

        .markdown-body blockquote {
            border-left: 3px solid var(--color-primary);
            padding: 12px 20px;
            margin: 16px 0;
            background: var(--color-primary-50);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            color: var(--color-text-secondary);
        }

        .markdown-body blockquote p:last-child {
            margin-bottom: 0;
        }

        .markdown-body table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 0.9rem;
        }

        .markdown-body th {
            background: var(--color-bg-subtle);
            font-weight: 600;
            color: var(--color-text);
            text-align: left;
            padding: 10px 14px;
            border: 1px solid var(--color-border);
        }

        .markdown-body td {
            padding: 10px 14px;
            border: 1px solid var(--color-border);
            color: var(--color-text-secondary);
        }

        .markdown-body tr:hover td {
            background: var(--color-bg-hover);
        }

        .markdown-body hr {
            border: none;
            border-top: 1px solid var(--color-border);
            margin: 32px 0;
        }

        .markdown-body img {
            max-width: 100%;
            border-radius: var(--radius-md);
            margin: 16px 0;
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 0;
            color: var(--color-text-muted);
        }

        .loading-spinner {
            width: 32px;
            height: 32px;
            border: 3px solid var(--color-border);
            border-top-color: var(--color-primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 0.9rem;
        }

        /* Error */
        .error-view {
            text-align: center;
            padding: 80px 40px;
        }

        .error-icon {
            width: 56px;
            height: 56px;
            background: #FEF2F2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .error-icon svg {
            width: 28px;
            height: 28px;
            color: #EF4444;
        }

        .error-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 8px;
        }

        .error-desc {
            color: var(--color-text-muted);
            font-size: 0.92rem;
            max-width: 400px;
            margin: 0 auto;
        }

        .error-hint {
            margin-top: 24px;
            padding: 12px 16px;
            background: var(--color-bg-subtle);
            border-radius: var(--radius-sm);
            font-size: 0.82rem;
            color: var(--color-text-muted);
            display: inline-block;
        }

        .error-hint code {
            background: var(--color-bg-white);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85em;
        }

        /* Scrollbar */
        .sidebar::-webkit-scrollbar {
            width: 5px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: var(--color-border);
            border-radius: 3px;
        }

        .sidebar::-webkit-scrollbar-thumb:hover {
            background: var(--color-text-light);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .content {
                padding: 24px 32px;
            }
        }

        @media (max-width: 768px) {
            .header-inner {
                padding: 0 16px;
            }

            .search-box {
                display: none;
            }

            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                position: static;
                height: auto;
                border-right: none;
                border-bottom: 1px solid var(--color-border);
                padding: 12px 0;
            }

            .doc-list {
                display: flex;
                overflow-x: auto;
                padding: 0 12px;
                gap: 4px;
            }

            .doc-link {
                white-space: nowrap;
                padding: 8px 14px;
                border-left: none;
                border-bottom: 2px solid transparent;
                border-radius: var(--radius-sm) var(--radius-sm) 0 0;
                font-size: 0.82rem;
            }

            .doc-link.active {
                border-left-color: transparent;
                border-bottom-color: var(--color-primary);
            }

            .content {
                padding: 20px 16px;
            }

            .doc-grid {
                grid-template-columns: 1fr;
            }

            .welcome-title {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div class="header-brand">
                <div class="header-logo">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"/>
                    </svg>
                </div>
                <span class="header-title">Tauri 开发文档</span>
                <span class="header-badge">v2</span>
            </div>
            <div class="header-search">
                <div class="search-box">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
                    </svg>
                    <span>搜索文档...</span>
                    <span class="search-shortcut">⌘K</span>
                </div>
            </div>
        </div>
    </header>

    <div class="layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <div class="sidebar-section-title">开始</div>
                <ul class="doc-list" id="docListStart">
                    <!-- 动态生成 -->
                </ul>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">核心概念</div>
                <ul class="doc-list" id="docListCore">
                    <!-- 动态生成 -->
                </ul>
            </div>
            <div class="sidebar-section">
                <div class="sidebar-section-title">进阶</div>
                <ul class="doc-list" id="docListAdvanced">
                    <!-- 动态生成 -->
                </ul>
            </div>
        </aside>

        <!-- Content -->
        <main class="content">
            <div id="contentArea">
                <!-- 动态生成 -->
            </div>
        </main>
    </div>

            zap: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/></svg>`,
            folder: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"/><path d="M2 10h20"/></svg>`,
            lightbulb: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14c.2-1 .7-1.7 1.5-2.5 1-.9 1.5-2.2 1.5-3.5A6 6 0 0 0 6 8c0 1 .2 2.2 1.5 3.5.7.7 1.3 1.5 1.5 2.5"/><path d="M9 18h6"/><path d="M10 22h4"/></svg>`,
            building: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>`
        };

        // 文档配置
        const docs = [
            {
                id: 'tauri-react-dev-setup',
                file: 'tauri-react-dev-setup.md',
                title: '开发环境搭建',
                desc: '环境依赖、安装步骤、项目创建',
                icon: icons.setup,
                category: 'start'
            },
            {
                id: 'tauri-dependencies',
                file: 'tauri-dependencies.md',
                title: '依赖安装指南',
                desc: 'Tauri 插件、Rust 依赖、前端依赖',
                icon: icons.package,
                category: 'start'
            },
            {
                id: 'tauri-build-config',
                file: 'tauri-build-config.md',
                title: '构建配置详解',
                desc: 'build.rs、tauri.conf.json 配置',
                icon: icons.settings,
                category: 'core'
            },
            {
                id: 'tauri-ipc-communication',
                file: 'tauri-ipc-communication.md',
                title: '前后端通信',
                desc: 'invoke、Event、Channel、Protocol',
                icon: icons.zap,
                category: 'core'
            },
            {
                id: 'tauri-project-structure',
                file: 'tauri-project-structure.md',
                title: '项目目录组织',
                desc: '企业级结构、分层架构最佳实践',
                icon: icons.folder,
                category: 'advanced'
            },
            {
                id: 'tauri-dev-tips',
                file: 'tauri-dev-tips.md',
                title: '开发技巧',
                desc: '调试、窗口管理、权限、打包发布',
                icon: icons.lightbulb,
                category: 'advanced'
            },
            {
                id: 'cockpit-tools-architecture',
                file: 'cockpit-tools-architecture.md',
                title: '案例：Cockpit Tools',
                desc: '企业级项目架构分析',
                icon: icons.building,
                category: 'advanced'
            }
        ];

        // 当前选中的文档
        let currentDoc = null;

        // 初始化侧边栏
        function initSidebar() {
            const lists = {
                start: document.getElementById('docListStart'),
                core: document.getElementById('docListCore'),
                advanced: document.getElementById('docListAdvanced')
            };

            docs.forEach(doc => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <a class="doc-link" data-id="${doc.id}" onclick="loadDoc('${doc.id}')">
                        <span class="doc-link-icon">${doc.icon}</span>
                        <span class="doc-link-text">${doc.title}</span>
                    </a>
                `;
                lists[doc.category].appendChild(li);
            });
        }

        // 显示欢迎页
        function showWelcome() {
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = `
                <div class="welcome">
                    <div class="welcome-header">
                        <h1 class="welcome-title">Tauri 开发文档</h1>
                        <p class="welcome-desc">Tauri v2 + React 项目开发指南与最佳实践，从环境搭建到企业级架构。</p>
                    </div>
                    <div class="doc-grid">
                        ${docs.map(doc => `
                            <div class="doc-card" onclick="loadDoc('${doc.id}')">
                                <div class="doc-card-icon">${doc.icon}</div>
                                <div class="doc-card-content">
                                    <div class="doc-card-title">${doc.title}</div>
                                    <div class="doc-card-desc">${doc.desc}</div>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // 加载文档
        async function loadDoc(id) {
            const doc = docs.find(d => d.id === id);
            if (!doc) return;

            // 更新选中状态
            document.querySelectorAll('.doc-link').forEach(link => {
                link.classList.toggle('active', link.dataset.id === id);
            });

            // 显示加载状态
            const contentArea = document.getElementById('contentArea');
            contentArea.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <span class="loading-text">加载中...</span>
                </div>
            `;

            try {
                // 加载 Markdown 文件
                const response = await fetch(doc.file);
                if (!response.ok) throw new Error('文件加载失败');
                const markdown = await response.text();

                // 渲染内容
                contentArea.innerHTML = `
                    <div class="doc-view">
                        <div class="doc-header">
                            <div class="doc-breadcrumb">
                                <a onclick="showWelcome()">文档</a>
                                <span>/</span>
                                <span>${doc.title}</span>
                            </div>
                            <h1 class="doc-title">${doc.title}</h1>
                            <div class="doc-meta">
                                <span class="doc-meta-item">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/></svg>
                                    ${doc.file}
                                </span>
                            </div>
                        </div>
                        <div class="markdown-body">${marked.parse(markdown)}</div>
                    </div>
                `;

                currentDoc = id;

                // 更新 URL
                history.pushState(null, '', `?doc=${id}`);

                // 滚动到顶部
                window.scrollTo({ top: 0, behavior: 'smooth' });

            } catch (error) {
                contentArea.innerHTML = `
                    <div class="error-view">
                        <div class="error-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>
                            </svg>
                        </div>
                        <h2 class="error-title">加载失败</h2>
                        <p class="error-desc">无法加载文档文件，请确保通过 HTTP 服务器访问此页面。</p>
                        <div class="error-hint">
                            尝试运行 <code>npx serve .</code> 或使用 VS Code Live Server
                        </div>
                    </div>
                `;
            }
        }

        // 配置 marked
        marked.setOptions({
            breaks: true,
            gfm: true
        });

        // 初始化
        initSidebar();

        // 检查 URL 参数
        const urlParams = new URLSearchParams(window.location.search);
        const docParam = urlParams.get('doc');
        if (docParam && docs.find(d => d.id === docParam)) {
            loadDoc(docParam);
        } else {
            showWelcome();
        }

        // 浏览器前进后退
        window.addEventListener('popstate', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const docParam = urlParams.get('doc');
            if (docParam && docs.find(d => d.id === docParam)) {
                loadDoc(docParam);
            } else {
                showWelcome();
                document.querySelectorAll('.doc-link').forEach(link => {
                    link.classList.remove('active');
                });
            }
        });
    </script>
</body>
</html>
